<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinnapatra</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

/* 🌌 BACKGROUND */
body{
  background: radial-gradient(circle at 20% 30%, rgba(80,0,120,0.4), transparent),
              radial-gradient(circle at 80% 70%, rgba(120,0,200,0.3), transparent),
              rgb(5,0,32);
  overflow:hidden;
  color:white;
}

/* 🎬 INTRO */
#intro{
  position:fixed;width:100%;height:100%;
  background:black;
  display:flex;justify-content:center;align-items:center;
  z-index:100;
}
#logo{
  font-size:clamp(32px,6vw,60px);
  color:#e6c76e;
  letter-spacing:6px;
  opacity:0;
}
#tagline{opacity:0;color:#aaa;text-align:center;margin-top:10px;}

/* 🌌 SCENE */
.scene{position:relative;width:100%;height:100vh;overflow:hidden;}

/* ✨ PARTICLES */
.particle{
  position:absolute;
  width:4px;height:4px;
  background:#e6c76e;
  border-radius:50%;
  opacity:0.6;
  animation: float linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* 🌿 LEAVES */
.leaf{
  position:absolute;
  width:12px;height:12px;
  background: radial-gradient(circle,#e6c76e,transparent);
  border-radius:50%;
  animation: fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh) rotate(0);}
  to{transform:translateY(110vh) rotate(360deg);}
}

/* 🌈 AURORA */
.aurora{
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,rgba(255,215,0,0.05),rgba(138,43,226,0.1),transparent);
  animation: auroraMove 12s infinite alternate;
}
@keyframes auroraMove{
  from{transform:translateX(-20%) translateY(-10%);}
  to{transform:translateX(20%) translateY(10%);}
}

/* 💎 CARD */
.card{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(90%,360px);
  padding:28px;
  border-radius:24px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 30px 80px rgba(0,0,0,0.9),
             inset 0 0 30px rgba(255,255,255,0.05);
  transition:0.2s;
}

/* ✨ REFLECTION */
.card::after{
  content:'';
  position:absolute;
  width:150%;
  height:150%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  top:-50%;
  left:-50%;
  transform:rotate(25deg);
  animation:shine 8s infinite;
}
@keyframes shine{
  from{transform:translateX(-100%) rotate(25deg);}
  to{transform:translateX(100%) rotate(25deg);}
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  background:linear-gradient(45deg,#e6c76e,#fff2a6);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* LOADER */
#loading{
  position:fixed;width:100%;height:100%;
  background:black;display:flex;
  justify-content:center;align-items:center;
  opacity:0;pointer-events:none;
}
.loader{
  width:50px;height:50px;
  border:4px solid gold;
  border-top:transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* HIDDEN */
.hidden{display:none;}

</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div>
    <h1 id="logo">CHINNAPATRA</h1>
    <p id="tagline">WORK PANEL</p>
  </div>
</div>

<!-- ⏳ LOADING -->
<div id="loading"><div class="loader"></div></div>

<!-- 🌌 MAIN -->
<div id="mainContent" class="hidden">
  <div class="scene" id="scene">

    <div class="aurora"></div>

    <div id="particles"></div>
    <div id="leaves"></div>

    <div class="card" id="card">
      <h2 style="text-align:center;color:#e6c76e;">CHINNAPATRA LOGIN</h2>

      <form id="loginForm">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password" required>
        <button>Login</button>
      </form>

      <p id="errorMsg"></p>
    </div>

  </div>
</div>

<!-- ✅ SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">

/* ================================
   🔐 SUPABASE CONFIG
================================ */
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://hbbneqtdnstnmdlgqvrx.supabase.co";
const SUPABASE_KEY = "sb_publishable_urinYS--USujhFG27qWNtA_C2HnIPW3";

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);


/* ================================
   ✨ PARTICLES
================================ */
const pContainer = document.getElementById("particles");
if (pContainer) {
  for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.animationDuration = (5 + Math.random() * 5) + "s";
    pContainer.appendChild(p);
  }
}

/* ================================
   🌿 LEAVES
================================ */
const lContainer = document.getElementById("leaves");
if (lContainer) {
  for (let i = 0; i < 20; i++) {
    let l = document.createElement("div");
    l.className = "leaf";
    l.style.left = Math.random() * 100 + "%";
    l.style.animationDuration = (6 + Math.random() * 6) + "s";
    lContainer.appendChild(l);
  }
}

/* ================================
   🎬 INTRO ANIMATION
================================ */
if (window.gsap) {
  gsap.timeline()
    .to("#logo", { opacity: 1, y: -20, duration: 1.5 })
    .to("#tagline", { opacity: 1, duration: 1 }, "-=0.5")
    .to("#intro", { opacity: 0, duration: 1, delay: 1 })
    .add(() => {
      const intro = document.getElementById("intro");
      const mainContent = document.getElementById("mainContent");
      if (intro) intro.style.display = "none";
      if (mainContent) mainContent.classList.remove("hidden");
    })
    .from("#card", { scale: 0.8, opacity: 0, duration: 1 });
}

/* ================================
   🎥 PARALLAX (DESKTOP ONLY)
================================ */
const card = document.getElementById("card");

if (card && window.innerWidth > 768) {
  document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.clientX) / 25;
    let y = (window.innerHeight / 2 - e.clientY) / 25;
    card.style.transform =
      `translate(-50%, -50%) rotateY(${x}deg) rotateX(${y}deg)`;
  });
}

/* ================================
   🔐 LOGIN SYSTEM
================================ */
const form = document.getElementById("loginForm");

if (form) {
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const loading = document.getElementById("loading");
    if (loading) {
      loading.style.opacity = 1;
      loading.style.pointerEvents = "all";
    }

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      /* 🔑 LOGIN */
      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) throw error;

      const user = data.user;

      /* 📦 FETCH PROFILE */
      const { data: profile, error: profileError } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (profileError) throw profileError;

      /* 💾 SAVE SESSION */
      localStorage.setItem("user", JSON.stringify({
        id: user.id,
        email: user.email,
        role: profile.role,
        name: profile.name
      }));

      /* 🚀 REDIRECT BASED ON ROLE */
      switch (profile.role) {
        case "superadmin":
          window.location.href = "superadmin.html";
          break;

        case "admin":
          window.location.href = "admin.html";
          break;

        case "artist":
          window.location.href = "artist.html";
          break;

        case "assigner":
          window.location.href = "assigner.html";
          break;

        case "publisher":
        case "poster":
          window.location.href = "publisher/poster.html";
          break;

        default:
          alert("Unknown role. Contact admin.");
      }

    } catch (err) {
      console.error(err);
      alert("Login failed: " + err.message);
    } finally {
      if (loading) {
        loading.style.opacity = 0;
        loading.style.pointerEvents = "none";
      }
    }
  });
}


/* ================================
   🔁 SESSION CHECK (AUTO LOGIN)
================================ */
(async () => {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    const user = data.session.user;

    const { data: profile } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    if (profile) {
      switch (profile.role) {
        case "superadmin":
          window.location.href = "superadmin.html";
          break;
        case "admin":
          window.location.href = "admin.html";
          break;
        case "artist":
          window.location.href = "artist.html";
          break;
        case "assigner":
          window.location.href = "assigner.html";
          break;
        case "publisher":
        case "poster":
          window.location.href = "publisher/poster.html";
          break;
      }
    }
  }
})();

</script>

</body>
</html>
